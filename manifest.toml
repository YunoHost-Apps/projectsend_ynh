#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "projectsend"
name = "ProjectSend"
description.en = "Upload files and assign them to specific clients"
description.fr = "Télécharger des fichiers et les affecter à des clients spécifiques"

version = "2002~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "GPL-2.0"
website = "https://www.projectsend.org/"
admindoc = "https://docs.projectsend.org/"
code = "https://github.com/projectsend/projectsend"
fund = "https://www.patreon.com/ignacionelson"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "250M"
ram.build = "150M"
ram.runtime = "90M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/projectsend"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    url = "https://github.com/projectsend/projectsend/releases/download/r2002/projectsend-r2002.zip"
    sha256 = "1077902d3b2dac44676b14072fe3c191020cf273e25dd1c528021e0d49ea8cc5"
    autoupdate.strategy = "latest_github_release"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "mariadb-server, php8.4-mysql, php8.4-mbstring, php8.4-gettext, php8.4-fileinfo, php8.4-gd, php8.4-xml, php8.4-zip"

    [resources.database]
    type = "mysql"
